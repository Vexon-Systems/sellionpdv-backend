name: Backup diário do banco de produção

permissions:
  contents: read

on:
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC = 03:00 America/Sao_Paulo, fora do horário de pico
  workflow_dispatch: {}     # permite disparar manualmente pelo GitHub, útil pra testar

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Gerar dump do Postgres e checksum (SAST-24)
        run: |
          NOME_ARQUIVO="backup-$(date +%Y-%m-%d).dump"
          docker run --rm postgres:17-alpine \
            pg_dump "${{ secrets.BACKUP_DB_URL }}" -Fc > "$NOME_ARQUIVO"

          # Checksum calculado sobre o arquivo já com o nome final, para que
          # "sha256sum -c" funcione direto na restauração sem precisar renomear nada.
          sha256sum "$NOME_ARQUIVO" > "$NOME_ARQUIVO.sha256"

          echo "NOME_ARQUIVO=$NOME_ARQUIVO" >> "$GITHUB_ENV"

      - name: Subir backup e checksum pro Storage (bucket privado, projeto de staging)
        run: |
          curl -sf -X PUT \
            "${{ secrets.BACKUP_STORAGE_URL }}/storage/v1/object/backups-db/${NOME_ARQUIVO}" \
            -H "Authorization: Bearer ${{ secrets.BACKUP_STORAGE_SERVICE_ROLE_KEY }}" \
            -H "apikey: ${{ secrets.BACKUP_STORAGE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @"${NOME_ARQUIVO}"

          curl -sf -X PUT \
            "${{ secrets.BACKUP_STORAGE_URL }}/storage/v1/object/backups-db/${NOME_ARQUIVO}.sha256" \
            -H "Authorization: Bearer ${{ secrets.BACKUP_STORAGE_SERVICE_ROLE_KEY }}" \
            -H "apikey: ${{ secrets.BACKUP_STORAGE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: text/plain" \
            --data-binary @"${NOME_ARQUIVO}.sha256"

      - name: Apagar backups com mais de 14 dias (dump + checksum juntos)
        run: |
          LISTA=$(curl -s -w "\n%{http_code}" -X POST \
            "${{ secrets.BACKUP_STORAGE_URL }}/storage/v1/object/list/backups-db" \
            -H "Authorization: Bearer ${{ secrets.BACKUP_STORAGE_SERVICE_ROLE_KEY }}" \
            -H "apikey: ${{ secrets.BACKUP_STORAGE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"prefix": "", "limit": 1000, "offset": 0, "sortBy": {"column": "name", "order": "desc"}}')

          STATUS=$(echo "$LISTA" | tail -n1)
          BODY=$(echo "$LISTA" | sed '$d')

          if [ "$STATUS" != "200" ]; then
            echo "Falha ao listar backups (HTTP $STATUS): $BODY"
            exit 1
          fi

          # Conta retenção só pelos .dump (ignora os .sha256 na contagem dos "14 mais
          # recentes") — cada dump agora tem um sidecar de checksum junto.
          echo "$BODY" | jq -r '.[].name' | grep '\.dump$' | tail -n +15 | while read -r ARQUIVO_ANTIGO; do
            echo "Apagando backup antigo: $ARQUIVO_ANTIGO (e seu checksum)"
            curl -sf -X DELETE \
              "${{ secrets.BACKUP_STORAGE_URL }}/storage/v1/object/backups-db/$ARQUIVO_ANTIGO" \
              -H "Authorization: Bearer ${{ secrets.BACKUP_STORAGE_SERVICE_ROLE_KEY }}" \
              -H "apikey: ${{ secrets.BACKUP_STORAGE_SERVICE_ROLE_KEY }}"
            curl -sf -X DELETE \
              "${{ secrets.BACKUP_STORAGE_URL }}/storage/v1/object/backups-db/$ARQUIVO_ANTIGO.sha256" \
              -H "Authorization: Bearer ${{ secrets.BACKUP_STORAGE_SERVICE_ROLE_KEY }}" \
              -H "apikey: ${{ secrets.BACKUP_STORAGE_SERVICE_ROLE_KEY }}"
          done
