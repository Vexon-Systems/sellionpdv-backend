# Configuração de testes — sobrescreve application.properties para CI e testes locais

# H2 em memória (substitui o PostgreSQL do application.properties)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Flyway desabilitado nos testes: H2 usa create-drop, schema não precisa de migrations
spring.flyway.enabled=false

# JWT (valor fictício — nunca usar em produção)
api.security.token.secret=segredo-de-teste-ci-nao-usar-em-producao-32chars
api.security.token.expiration-hours=2
api.security.token.timezone=America/Sao_Paulo

# Rate limit de login com capacidade alta nos testes: evita que testes que fazem
# várias chamadas de login em sequência rápida esbarrem no limite (o comportamento
# do filtro em si já é validado manualmente, não precisa ser restritivo aqui).
security.rate-limit.login.capacidade=10000
security.rate-limit.login.janela-minutos=1

# Propriedades de aplicação ausentes no test-classpath porque application.properties
# de teste substitui completamente o de produção (mesma path, prioridade maior).
# Valores espelham os defaults do application.properties de produção.
app.cors.allowed-origins=http://localhost:5173
app.uploads.max-size-bytes=5242880

# Supabase Storage (valores fictícios — SupabaseImagemStorage nunca é chamado de verdade nos testes)
supabase.storage.url=http://test-supabase.invalid
supabase.storage.service-role-key=chave-de-teste-fake
supabase.storage.bucket=produtos-imagens-teste
