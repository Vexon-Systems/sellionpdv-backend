spring.application.name=sellionpdv

spring.config.import=optional:classpath:application-secret.properties


spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver


spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_batch_fetch_size=16

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

sentry.dsn=${SENTRY_DSN:}
sentry.environment=${SENTRY_ENVIRONMENT:development}


api.security.token.secret=${JWT_SECRET}
api.security.token.expiration-hours=2
api.security.token.timezone=America/Sao_Paulo

app.uploads.max-size-bytes=5242880
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

supabase.storage.url=${SUPABASE_URL}
supabase.storage.service-role-key=${SUPABASE_SERVICE_ROLE_KEY}
supabase.storage.bucket=${SUPABASE_STORAGE_BUCKET:produtos-imagens}