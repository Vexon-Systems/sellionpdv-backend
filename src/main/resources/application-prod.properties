# Ativado automaticamente pelo Dockerfile via --spring.profiles.active=prod

# Desativa logs de SQL (performance e segurança)
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# SAST-06: Swagger/OpenAPI não deve ficar acessível publicamente em produção.
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# SAST-07: aplicação roda atrás do proxy reverso do Render — sem isso,
# request.getRemoteAddr() no LoginRateLimitFilter sempre retorna o IP do proxy,
# não o do cliente, tornando o rate limit efetivamente global (todo mundo compartilha
# o mesmo balde) em vez de por-cliente.
server.forward-headers-strategy=framework
