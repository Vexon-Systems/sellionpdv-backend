# Ativado via variável de ambiente SPRING_PROFILES_ACTIVE=staging no Render.
# Espelha application-prod.properties: staging deve se comportar como produção
# de verdade, pra testar o que vai ser publicado, não um ambiente relaxado.

# Desativa logs de SQL (performance e segurança)
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# SAST-06: Swagger/OpenAPI não deve ficar acessível publicamente (staging espelha prod).
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# SAST-07: staging também roda atrás do proxy reverso do Render.
server.forward-headers-strategy=framework
