# Copie este arquivo para "application-secret.properties" (mesma pasta) e preencha.
# application-secret.properties é ignorado pelo Git de propósito — nunca commitar credencial real.
#
# Setup padrão de desenvolvimento local: suba o Postgres via Docker antes de rodar o backend.
#   docker compose up -d   (na raiz do repositório)
# Os valores de DB_URL/DB_USERNAME/DB_PASSWORD abaixo já são os do docker-compose.yml —
# não precisa mudar nada nessas três linhas pra desenvolver localmente.

DB_URL=jdbc:postgresql://localhost:5433/sellionpdv_dev
DB_USERNAME=sellionpdv
DB_PASSWORD=sellionpdv_dev_local

# Qualquer string serve localmente — é só a chave de assinatura do JWT nesta máquina.
JWT_SECRET=troque-por-uma-string-aleatoria-qualquer-so-para-uso-local

# Supabase Storage (upload de imagem de produto/avatar) — não é usado no dia a dia local.
# Deixe os placeholders abaixo para a aplicação subir normalmente; upload de imagem
# simplesmente vai falhar se você tentar usar, o que é esperado em ambiente local.
# Só troque por credenciais reais se precisar testar essa funcionalidade especificamente
# (nesse caso, use um projeto Supabase descartável — nunca o de staging ou produção).
SUPABASE_URL=http://localhost:0
SUPABASE_SERVICE_ROLE_KEY=dev-placeholder-nao-usado-localmente
